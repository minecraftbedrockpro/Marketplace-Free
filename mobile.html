<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace Free</title>
    <link rel="stylesheet" href="styles-mobile.css">
    <link rel="icon" href="minecoin.png" type="image/png"> <!-- Adiciona o favicon -->
</head>
<body>
    <div class="header">
        <img src="icones/logo.png" alt="Logo" id="logo-banner">
        <div class="mobile-header-actions">
            <button id="section-trigger" class="mobile-top-button" type="button">
                <span class="mobile-top-button-label">Abas</span>
            </button>
            <button id="search-trigger" class="mobile-top-button" type="button">
                <span class="mobile-top-button-label">Busca</span>
            </button>
        </div>
    </div>
    <div class="container">
        <div class="mobile-overlay" id="mobile-overlay"></div>

        <div class="mobile-panel" id="mobile-sections-panel">
            <div class="mobile-panel-header">
                <h2>Selecionar aba</h2>
                <button class="mobile-panel-close" type="button" data-close-panel="sections">×</button>
            </div>
            <div class="mobile-panel-list">
                <button class="mobile-section-button" onclick="changeSection('procure')">
                    <span class="sidebar-item-content"><img src="icones/procure.png" alt="Tipo" class="icon"><span class="sidebar-label">Tipo</span></span>
                </button>
                <button class="mobile-section-button" onclick="changeSection('popular')">
                    <span class="sidebar-item-content"><img src="icones/popular.png" alt="Popular" class="icon"><span class="sidebar-label">Popular</span></span>
                </button>
                <button class="mobile-section-button" onclick="changeSection('mundos')">
                    <span class="sidebar-item-content"><img src="icones/mundo.png" alt="Mundos" class="icon"><span class="sidebar-label">Mundos</span></span>
                </button>
                <button class="mobile-section-button" onclick="changeSection('addon')">
                    <span class="sidebar-item-content"><img src="icones/addon.png" alt="Add-Ons" class="icon"><span class="sidebar-label">Add-Ons</span></span>
                </button>
                <button class="mobile-section-button" onclick="changeSection('textura')">
                    <span class="sidebar-item-content"><img src="icones/textura.png" alt="Texturas" class="icon"><span class="sidebar-label">Texturas</span></span>
                </button>
                <button class="mobile-section-button" onclick="changeSection('shader')">
                    <span class="sidebar-item-content"><img src="icones/shader.png" alt="Shaders" class="icon"><span class="sidebar-label">Shaders</span></span>
                </button>
                <button class="mobile-section-button" onclick="changeSection('personagens')">
                    <span class="sidebar-item-content"><img src="icones/persona.png" alt="Skins" class="icon"><span class="sidebar-label">Skins</span></span>
                </button>
            </div>
        </div>

        <div class="mobile-panel mobile-search-panel" id="mobile-search-panel">
            <div class="mobile-panel-header">
                <h2>Buscar pacote</h2>
                <button class="mobile-panel-close" type="button" data-close-panel="search">×</button>
            </div>
            <div class="mobile-search-body">
                <input type="text" id="search-bar" placeholder="Buscar pelo nome...">
            </div>
        </div>

        <div class="sidebar" id="sidebar" hidden>
            <button onclick="changeSection('procure')">
                <span class="sidebar-item-content"><img src="icones/procure.png" alt="Tipo" class="icon"><span class="sidebar-label">Tipo</span></span>
            </button>
            <button onclick="changeSection('popular')">
                <span class="sidebar-item-content"><img src="icones/popular.png" alt="Popular" class="icon"><span class="sidebar-label">Popular</span></span>
            </button>
            <button onclick="changeSection('mundos')">
                <span class="sidebar-item-content"><img src="icones/mundo.png" alt="Mundos" class="icon"><span class="sidebar-label">Mundos</span></span>
            </button>
            <button onclick="changeSection('addon')">
                <span class="sidebar-item-content"><img src="icones/addon.png" alt="Add-Ons" class="icon"><span class="sidebar-label">Add-Ons</span></span>
            </button>
            <button onclick="changeSection('textura')">
                <span class="sidebar-item-content"><img src="icones/textura.png" alt="Texturas" class="icon"><span class="sidebar-label">Texturas</span></span>
            </button>
            <button onclick="changeSection('shader')">
                <span class="sidebar-item-content"><img src="icones/shader.png" alt="Shaders" class="icon"><span class="sidebar-label">Shaders</span></span>
            </button>
            <button onclick="changeSection('personagens')">
                <span class="sidebar-item-content"><img src="icones/persona.png" alt="Skins" class="icon"><span class="sidebar-label">Skins</span></span>
            </button>
        </div>
        <div class="content" id="content">
            <div id="results" class="scrollable-content">
                <!-- Resultados da busca serão exibidos aqui -->
            </div>
        </div>
    </div>
    <script src="gitlab-mc.js"></script>
    <script src="scripts-mobile.js"></script> <!-- Script para funcionalidades mobile -->
</body>
</html>
